# Publishes this n8n community node package to npm on every version tag push.
#
# From May 1 2026, n8n requires all community nodes to be published via GitHub
# Actions with npm provenance. `bun run release` (n8n-node release) detects CI
# and runs lint + build, then publishes with provenance (NPM_CONFIG_PROVENANCE).
#
# ─── ONE-TIME SETUP ────────────────────────────────────────────────────────────
# Option A - OIDC Trusted Publishing (recommended, no secrets):
#   npmjs.com → package settings → Trusted Publishers → add this repo with
#   workflow name "publish.yml". Leave NPM_TOKEN unset.
# Option B - npm token: add an NPM_TOKEN repo secret (granular, read+write).
#
# ─── RELEASE ───────────────────────────────────────────────────────────────────
# Locally run `bun run release` to bump the version, update the changelog,
# commit, tag, and push - which triggers this workflow.

name: Publish

on:
  push:
    tags:
      # Matches 0.1.0, 1.2.3, 2.0.0-rc.1, etc.
      - '*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      # Required to mint an OIDC token for npm provenance attestation.
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Release
        # Lint + build run automatically; publishes to npm with provenance.
        # Option A (OIDC): leave NPM_TOKEN unset. Option B: set NPM_TOKEN secret.
        run: |
          [ -n "$NPM_TOKEN" ] && npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          bun run release
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
